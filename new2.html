    <style>
        :root {
            --primary-burgundy: #8b0015;
            --primary-gradient: linear-gradient(90deg, #7a0010 0%, #a30018 100%);
            --text-dark: #111827;
            --text-muted: #4b5563;
            --input-bg: #f3f4f6;
            --focus-shadow: 0 4px 12px rgba(139, 0, 21, 0.08);
            --error-red: #df2222;
            --success-green: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* --- FIXED: Added structural layout rules to lock the layout --- */
        html, body {
            width: 100%;
            margin: 0;
            padding: 0;
            min-height: 100vh; 
            min-height: 100dvh; /* Adapts to modern mobile PWA safe areas */
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
            transition: filter 0.4s ease-out, opacity 0.4s ease-out;
        }

        body.is-loading-page {
            filter: blur(8px);
            opacity: 0.6;
            pointer-events: none; /* Prevents double-clicking while loading */
        }
        /* ------------------------------------------------------------- */

        .bg-wave {
            position: absolute;
            left: 0;
            width: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .bg-wave-top {
            top: 0;
            height: 8vh; 
            min-height: 55px; 
        }
        
        .bg-wave-bottom {
            bottom: 0;
            height: 10vh;
            min-height: 70px;
        }

        .back-btn {
            position: absolute;
            top: calc(15px + env(safe-area-inset-top));
            left: 20px;
            color: #ffffff;
            z-index: 15;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: background 0.2s ease;
        }

        .back-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }

        /* FIXED: Added flex-grow and box-sizing so the container sizes perfectly */
        .app-view {
            width: 100%;
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center; 
            padding: calc(11vh + env(safe-area-inset-top)) 6% calc(12vh + env(safe-area-inset-bottom)) 6%;
            position: relative;
            z-index: 1;
            box-sizing: border-box;
        }

        .app-content-wrapper {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
        }

        .header-content {
            text-align: center;
            margin-bottom: 4vh;
        }

        .header-content h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
            letter-spacing: -0.03em;
        }

        .header-content p {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .input-group {
            position: relative;
            width: 100%;
        }

        .input-box {
            width: 100%;
            height: 56px;
            background-color: var(--input-bg);
            border: 1.5px solid transparent;
            border-radius: 14px;
            padding: 0 45px 0 16px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dark);
            outline: none;
            transition: all 0.2s ease;
        }

        .input-box:focus {
            border-color: var(--primary-burgundy);
            background-color: #ffffff;
            box-shadow: var(--focus-shadow);
        }

        .field-label {
            position: absolute;
            top: -9px;
            left: 14px;
            background-color: #f8f9fa; 
            padding: 0 6px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dark);
            z-index: 2;
            cursor: pointer;
        }

        .label-highlight {
            color: var(--primary-burgundy);
            font-weight: 700;
        }

        .phone-input-wrapper {
            display: flex;
            align-items: center;
        }

        .country-trigger {
            position: absolute;
            left: 14px;
            z-index: 3;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            height: 100%;
            padding-right: 8px;
            border-right: 1.5px solid #e5e7eb;
        }

        .trigger-flag {
            font-size: 18px;
            line-height: 1;
        }

        .trigger-code {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .trigger-arrow {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .input-box.phone-indent {
            padding-left: 105px;
        }

        .input-icon-right {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .form-action-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            margin-top: 10px;
            padding-bottom: 28px; 
        }

        .form-buttons-column {
            display: flex;
            flex-direction: column;
            gap: 26px;
            width: 100%;
            align-items: center;
        }

        .btn-submit {
            width: 100%;
            height: 56px;
            background: var(--primary-gradient);
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(139, 0, 21, 0.15);
            transition: transform 0.1s ease, opacity 0.2s ease;
            letter-spacing: -0.01em;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-biometric {
            width: 90px; 
            height: 90px;
            background: #ffffff; 
            color: var(--primary-burgundy);
            border: 6px solid #f8f9fa;
            border-radius: 28px; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                12px 12px 24px rgba(0, 0, 0, 0.08), 
                -12px -12px 24px #ffffff,
                inset 2px 2px 6px rgba(255, 255, 255, 0.9),
                inset -2px -2px 6px rgba(0, 0, 0, 0.03);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-biometric:active {
            box-shadow: 
                inset 8px 8px 16px rgba(0, 0, 0, 0.07), 
                inset -8px -8px 16px #ffffff;
            transform: translateY(3px) scale(0.95);
            border-color: #f3f4f6;
        }

        .biometric-btn-icon {
            width: 72px; 
            height: 72px; 
            object-fit: contain;
            mix-blend-mode: multiply;
            animation: fingerprint-float 2.5s infinite ease-in-out;
        }

        @keyframes fingerprint-float {
            0% { 
                transform: translateY(0) scale(1); 
                filter: drop-shadow(0 0 0px rgba(139, 0, 21, 0)); 
            }
            50% { 
                transform: translateY(-2px) scale(1.05); 
                filter: drop-shadow(0 4px 6px rgba(139, 0, 21, 0.2)); 
            }
            100% { 
                transform: translateY(0) scale(1); 
                filter: drop-shadow(0 0 0px rgba(139, 0, 21, 0)); 
            }
        }

        .reset-link {
            font-size: 14px;
            color: var(--text-dark);
            font-weight: 500;
            text-decoration: none;
            margin-top: 8px;
        }

        .reset-link span {
            text-decoration: underline;
            color: var(--primary-burgundy);
            font-weight: 700;
        }

        .signup-redirect-footer {
            position: absolute;
            bottom: calc(4vh + env(safe-area-inset-bottom));
            left: 0;
            width: 100%;
            font-size: 13px;
            color: #ffffff;
            text-align: center;
            font-weight: 600;
            z-index: 10;
        }

        .signup-redirect-footer a {
            color: #ffffff;
            font-weight: 800;
            text-decoration: underline;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            width: 90%;
            max-width: 400px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(0.95) translateY(10px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 75vh;
        }

        .modal-overlay.active .modal-card {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f3f4f6;
        }

        .modal-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .modal-close-btn {
            border: none;
            background: none;
            font-size: 22px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px;
        }

        .modal-search-wrapper { padding: 14px; border-bottom: 1px solid #f3f4f6; }
        .modal-search { width: 100%; height: 44px; background: #f3f4f6; border: 1.5px solid transparent; border-radius: 12px; padding: 0 14px; font-size: 15px; font-weight: 600; outline: none; }
        .modal-search:focus { border-color: var(--primary-burgundy); background: #ffffff; }
        .country-list-scroll { overflow-y: auto; flex: 1; padding: 8px 0; }
        .country-item { display: flex; align-items: center; padding: 12px 20px; cursor: pointer; transition: background 0.15s ease; gap: 14px; }
        .country-item:active, .country-item:hover { background: #f9fafb; }
        .item-flag { font-size: 22px; }
        .item-name { font-size: 15px; font-weight: 600; color: var(--text-dark); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-code { font-size: 14px; font-weight: 700; color: var(--text-muted); }

        .toast-container {
            position: fixed;
            top: calc(20px + env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 24, 39, 0.96);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            z-index: 3999; 
            display: none;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            width: 85%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <!-- Country Selection Modal -->
    <div class="modal-overlay" id="countryModalOverlay">

            <form class="login-form" id="loginForm">

                    <input type="tel" id="loginPhone" class="input-box phone-indent" autofocus placeholder="9xxxxxxxx" maxlength="9" required>

                    <label class="field-label" for="loginPin">PIN (6-digits) <span class="label-highlight">*</span></label>
                    <input type="password" id="loginPin" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" class="input-box" placeholder="••••••" required>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // --- SEAMLESS TRANSITION FUNCTION ---
        async function smoothNavigate(url) {
            // Apply the blur effect immediately
            document.body.classList.add('is-loading-page');
            
            try {
                // Fetch the new page in the background
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response failed');
                const htmlString = await response.text();
                
                // Update URL silently
                history.pushState(null, '', url);
                
                // document.write executes all embedded scripts perfectly (unlike innerHTML)
                document.open();
                document.write(htmlString);
                document.close();
            } catch (error) {
                console.error("Seamless load failed, falling back to standard navigation", error);
                window.location.href = url; 
            }
        }

        // Intercept all standard links (Create Account, Back Button, etc)
        document.addEventListener('click', (e) => {
            const link = e.target.closest('a');
            // Ensure it's a local link and not just an empty "#" href
            if (link && link.href && link.origin === window.location.origin && !link.href.includes('#')) {
                e.preventDefault();
                smoothNavigate(link.href);
            }
        });

        // Ensure browser "Back" button works properly
        window.addEventListener('popstate', () => {
            document.body.classList.add('is-loading-page');
            window.location.reload(); 
        });
        // ------------------------------------

        const firebaseConfig = {
            apiKey: "AIzaSyCRHoIZf1ZPR9m3YYTv-I9CfwyGqsSOMWo",
            authDomain: "birrgo-fdf7e.firebaseapp.com",
            databaseURL: "https://birrgo-fdf7e-default-rtdb.firebaseio.com",
            projectId: "birrgo-fdf7e",
            storageBucket: "birrgo-fdf7e.firebasestorage.app",
            messagingSenderId: "2317445154",
            appId: "1:2317445154:web:4275cbb0f46b28f64f827b",
            measurementId: "G-24X13TZ43D"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const countries = [
            { name: "Ethiopia", code: "+251", flag: "🇪🇹" },
            { name: "Kenya", code: "+254", flag: "🇰🇪" },
            { name: "United States", code: "+1", flag: "🇺🇸" },
            { name: "United Kingdom", code: "+44", flag: "🇬🇧" },
            { name: "United Arab Emirates", code: "+971", flag: "🇦🇪" }
        ];

        let activeSelectedPrefix = "+251";
        let isSubmitting = false; 

        const overlay = document.getElementById('countryModalOverlay');
        const listScrollContainer = document.getElementById('countryListScroll');
        const searchInput = document.getElementById('modalSearchInput');
        const phoneInput = document.getElementById('loginPhone');
        const openBiometricBtn = document.getElementById('biometricBtn');

        function populateCountries(filterText = "") {
            listScrollContainer.innerHTML = "";
            const cleanFilter = filterText.toLowerCase().trim();
            
            const filtered = countries.filter(c => 
                c.name.toLowerCase().includes(cleanFilter) || 
                c.code.includes(cleanFilter)
            );

            filtered.forEach(country => {
                const row = document.createElement('div');
                row.className = 'country-item';
                row.innerHTML = `
                    <span class="item-flag">${country.flag}</span>
                    <span class="item-name">${country.name}</span>
                    <span class="item-code">${country.code}</span>
                `;
                row.addEventListener('click', () => {
                    document.getElementById('currentFlag').innerText = country.flag;
                    document.getElementById('currentCode').innerText = country.code;
                    activeSelectedPrefix = country.code;
                    
                    if (activeSelectedPrefix === "+251") {
                        phoneInput.placeholder = "9xxxxxxxx";
                        phoneInput.maxLength = 9;
                    } else {
                        phoneInput.placeholder = "Phone number";
                        phoneInput.removeAttribute('maxLength');
                    }
                    
                    closeCountryModal();
                });
                listScrollContainer.appendChild(row);
            });
        }

        function openCountryModal() {
            populateCountries();
            searchInput.value = "";
            overlay.classList.add('active');
        }

        function closeCountryModal() {
            overlay.classList.remove('active');
        }

        document.getElementById('countryTriggerBtn').addEventListener('click', openCountryModal);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeCountryModal();
        });
        searchInput.addEventListener('input', (e) => {
            populateCountries(e.target.value);
        });

        phoneInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        function showNotification(message) {
            const toast = document.getElementById('toast-message');
            toast.innerText = message;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }

        openBiometricBtn.addEventListener('click', () => {
            const savedPhone = localStorage.getItem('auth_session_phone');
            if (!savedPhone) {
                showNotification("Please log in with your PIN once before using fingerprint.");
                return;
            }
            
            // Replaced hard redirect with seamless navigation
            smoothNavigate("finger.html");
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (isSubmitting) return;

            const submitBtn = document.getElementById('submitBtn');
            const rawPhone = phoneInput.value.trim();
            const pinAttempt = document.getElementById('loginPin').value;

            let cleanPhone = rawPhone.replace(/^0+/, '');

            if (activeSelectedPrefix === "+251") {
                if (!/^[79][0-9]{8}$/.test(cleanPhone)) {
                    showNotification("Ethiopian phone numbers must be exactly 9 digits starting with 7 or 9.");
                    return;
                }
            } else {
                if (cleanPhone.length < 6 || cleanPhone.length > 14) {
                    showNotification("Please enter a valid phone number length.");
                    return;
                }
            }

            if (pinAttempt.length !== 6 || !/^\d+$/.test(pinAttempt)) {
                showNotification("PIN must be a valid 6-digit entry.");
                return;
            }

            try {
                isSubmitting = true;
                submitBtn.disabled = true;
                submitBtn.innerText = "Logging In...";

                const userSnapshot = await get(ref(db, 'users/' + cleanPhone));

                if (!userSnapshot.exists()) {
                    showNotification("Account not found. Please register first.");
                    isSubmitting = false;
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Log In";
                    return;
                }

                const userData = userSnapshot.val();

                if (userData.securityPin === pinAttempt) {
                    localStorage.setItem('auth_session_phone', cleanPhone);
                    submitBtn.innerText = "Redirecting Securely...";
                    
                    // Replaced hard redirect with seamless navigation
                    setTimeout(() => {
                        smoothNavigate("dashboard.html");
                    }, 1000);
                } else {
                    showNotification("Incorrect security PIN.");
                    isSubmitting = false;
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Log In";
                }

            } catch (error) {
                console.error("Auth Error: ", error);
                showNotification("Connection lost. Please try again.");
                isSubmitting = false;
                submitBtn.disabled = false;
                submitBtn.innerText = "Log In";
            }
        });
    </script>
</body>
</html>
